<div class="card bg-base-100 w-1/2 mx-auto pd-10 mt-20 shadow-xl"> 
    <h3 class="text-3xl text-red-500">Dating App</h3>
    <ul class="list">
      @for (member of members(); track member.publicId){
          <li class="list-row items-center link-hover border-b border-gray-300 py-3">
            <img src="/user.png" alt="user avatar" class="size-12 rounded-box" >
            {{member.displayName}}
          </li>
        }
    </ul>
</div>
